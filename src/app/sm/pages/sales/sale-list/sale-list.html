
<div class="card">
    <p-table
        #dt1
        [value]="mainList()"      
        [globalFilterFields]="['invoice_no','sale_date','total','discount','created_at','grand_total','customer_name','customer_phone']"
        dataKey="id"
        [tableStyle]="{ 'min-width': '50rem' }"
        [rows]="5"
        [paginator]="true"
        [rowsPerPageOptions]="[5,10,20]"
        [loading]="loading()"
    >


<ng-template #caption>
             <div class="flex justify-between items-center w-full">

        <!-- Title -->
        <h2 class="text-xl font-semibold">Sale</h2>

        <!-- Right Side -->
        <div class="flex items-center gap-3">

            <!-- Search -->
            <p-iconfield iconPosition="left">
                <p-inputicon>
                    <i class="pi pi-search"></i>
                </p-inputicon>
                <input pInputText
                       type="text"
                       (input)="dt1.filterGlobal($any($event.target).value, 'contains')"
                       placeholder="Search..." />
            </p-iconfield>

            <!-- Add Button -->
            <button pButton
                    type="button"
                    title="Add"
                    icon="pi pi-plus"
                    (click)="add()">
            </button>

        </div>

    </div>
        </ng-template>
        <ng-template #header>
            <tr>
                   <th pSortableColumn="sale_date">
<div class="flex items-center gap-2">
                        Sale Date
                        <p-sortIcon field="sale_date" />
                    </div>
                  </th>
                <th pSortableColumn="invoice_no">
                    <div class="flex items-center gap-2">
                        Invoice No.
                        <p-sortIcon field="invoice_no" />
                    </div>
                    
                
                </th>
                <th pSortableColumn="customer_name">
                    <div class="flex items-center gap-2">
                        Customer Name
                        <p-sortIcon field="customer_name" />
                    </div>
                </th>
                  
                
                  <th pSortableColumn="grand_total">
                    <div class="flex items-center gap-2">
                       Invoice Amount
                        <p-sortIcon field="grand_total" />
                    </div>
                  </th>
                  <th pSortableColumn="balance_amount">
                    <div class="flex items-center gap-2">
                      Balance
                        <p-sortIcon field="balance_amount" />
                    </div>
                  </th>
                  <th pSortableColumn="status">
                    <div class="flex items-center gap-2">
                       Status
                        <p-sortIcon field="status" />
                    </div>
                  </th>
                <th>Action</th>
            </tr>
        </ng-template>

        <ng-template #body let-row>
            <tr>
                <td>{{ row.sale_date | date:'dd-MM-yyyy'}}</td>
                <td>{{ row.invoice_no }}</td>
                <td>{{ row.customer_name }}</td>
                <td> {{ row.grand_total | currency:'AED'}}</td>
                <td> {{ row.balance_amount |  currency:'AED' }}</td>
                <td>{{ row.status }}</td>
                 <td class="flex gap-2">
                    <button pButton 
                            type="button" 
                            icon="pi pi-pencil"
                            class="p-button-warning"
                            (click)="edit(row.id)">
                    </button>
 <button pButton 
                            type="button" 
                            icon="pi pi-eye"
                            class="p-button-warning"
                            (click)="invoice(row.id)">
                    </button>
                    <button pButton 
                            type="button" 
                            icon="pi pi-trash" 
                            class="p-button-danger"
                            (click)="delete(row.id)">
                    </button>
                </td>
                    
            </tr>
        </ng-template>

        <ng-template #emptymessage>
            <tr>
                <td colspan="4">No data found.</td>
            </tr>
        </ng-template>

    </p-table>
</div>
