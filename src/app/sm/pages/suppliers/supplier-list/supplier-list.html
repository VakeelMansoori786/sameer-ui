<div class="card">
    <p-table
        #dt1
        [value]="mainList()"
        [globalFilterFields]="['name','phone','email','trn','address']"
        dataKey="id"
        [tableStyle]="{ 'min-width': '60rem' }"
        [rows]="5"
        [paginator]="true"
        [rowsPerPageOptions]="[5,10,20]"
        [loading]="loading()"
    >

        <!-- Search -->
        <ng-template #caption>
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-semibold">Suppliers/Customers</h2>
                <p-iconfield iconPosition="left">
                    <p-inputicon>
                        <i class="pi pi-search"></i>
                    </p-inputicon>
                    <input pInputText 
                           type="text"  
                           (input)="dt1.filterGlobal($any($event.target).value, 'contains')" 
                           placeholder="Search supplier..." />
                </p-iconfield>
            </div>
        </ng-template>

        <!-- Header -->
        <ng-template #header>
            <tr>
                <th pSortableColumn="name">
                    <div class="flex items-center gap-2">
                        Name
                        <p-sortIcon field="name"></p-sortIcon>
                    </div>
                </th>

                <th pSortableColumn="phone">
                    <div class="flex items-center gap-2">
                        Phone
                        <p-sortIcon field="phone"></p-sortIcon>
                    </div>
                </th>

                <th pSortableColumn="email">
                    <div class="flex items-center gap-2">
                        Email
                        <p-sortIcon field="email"></p-sortIcon>
                    </div>
                </th>

                <th pSortableColumn="trn">
                    <div class="flex items-center gap-2">
                        TRN
                        <p-sortIcon field="trn"></p-sortIcon>
                    </div>
                </th>

                <th pSortableColumn="created_at">
                    <div class="flex items-center gap-2">
                        Created
                        <p-sortIcon field="created_at"></p-sortIcon>
                    </div>
                </th>

                <th>Action</th>
            </tr>
        </ng-template>

        <!-- Body -->
        <ng-template #body let-row>
            <tr>
                <td>{{ row.name }}</td>
                <td>{{ row.phone }}</td>
                <td>{{ row.email }}</td>
                <td>{{ row.trn }}</td>
                <td>{{ row.created_at | date:'dd-MM-yyyy' }}</td>

                <td class="flex gap-2">
                    <button pButton 
                            type="button" 
                            icon="pi pi-pencil"
                            class="p-button-warning"
                            (click)="edit(row.id)">
                    </button>

                    <button pButton 
                            type="button" 
                            icon="pi pi-trash" 
                            class="p-button-danger"
                            (click)="delete(row.id)">
                    </button>
                </td>
            </tr>
        </ng-template>

        <!-- Empty -->
        <ng-template #emptymessage>
            <tr>
                <td colspan="6" class="text-center p-4">
                    No suppliers found.
                </td>
            </tr>
        </ng-template>

    </p-table>
</div>
