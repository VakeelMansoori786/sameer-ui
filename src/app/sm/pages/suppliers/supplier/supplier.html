<p-toast key="tst"></p-toast>
<p-confirmDialog />

<form [formGroup]="mainForm" (ngSubmit)="onSubmit()" class="card flex flex-col gap-6 w-full p-5">

  <!-- Name -->
  <div class="flex flex-wrap gap-2 w-full">
    <label for="name">Supplier/Customer Name</label>
    <input pInputText id="name" type="text" formControlName="name" class="w-full p-3" />
    <small *ngIf="f['name'].invalid && (f['name'].dirty || f['name'].touched)" class="text-red-600">
      Name is required
    </small>
  </div>

  <!-- Phone & Email -->
  <div class="flex flex-col md:flex-row gap-6">
    
    <div class="flex flex-wrap gap-2 w-full">
      <label for="phone">Phone</label>
      <input pInputText id="phone" type="text" formControlName="phone" class="w-full p-3" />
      <small *ngIf="f['phone'].invalid && (f['phone'].dirty || f['phone'].touched)" class="text-red-600">
        Valid phone is required
      </small>
    </div>

    <div class="flex flex-wrap gap-2 w-full">
      <label for="email">Email</label>
      <input pInputText id="email" type="email" formControlName="email" class="w-full p-3" />
      <small *ngIf="f['email'].invalid && (f['email'].dirty || f['email'].touched)" class="text-red-600">
        Valid email is required
      </small>
    </div>

  </div>

  <!-- Address -->
  <div class="flex flex-wrap gap-2 w-full">
    <label for="address">Address</label>
    <textarea pInputTextarea id="address" rows="3" formControlName="address" class="w-full p-3"></textarea>
  </div>

  <!-- TRN -->
  <div class="flex flex-wrap gap-2 w-full">
    <label for="trn">TRN</label>
    <input pInputText id="trn" type="text" formControlName="trn" class="w-full p-3" />
  </div>

  <!-- Buttons -->
  <div class="flex flex-wrap gap-2 w-full">
    <button pButton pRipple type="submit" label="Save" class="p-3 text-xl"></button>
    <button pButton pRipple type="button" label="Reset" (click)="Reset()" class="p-3 text-xl ml-2"></button>
  </div>

</form>
