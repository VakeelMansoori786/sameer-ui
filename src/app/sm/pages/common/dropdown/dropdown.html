<p-toast key="tst"></p-toast>
<p-confirmDialog />

<form [formGroup]="mainForm" (ngSubmit)="Add()" class="card flex flex-col gap-6 w-full p-5">

    <div class="font-semibold text-xl">Drop down</div>

    <div class="flex flex-wrap items-start gap-6">

        <div class="field">
            <p-select 
                id="table" 
                formControlName="table" 
                [options]="tableList()"        
                optionLabel="name" 
                optionValue="name" 
                placeholder="Select"
                [filter]="true"
                (onChange)="GetDropdownTable()"
                class="w-full">
            </p-select>
        </div>

        <div class="field">
            <input pInputText 
                   id="name" 
                   type="text" 
                   placeholder="name"  
                   formControlName="name" />
        </div>

        <p-button  
            type="submit"   
            [loading]="loading()"    
            label="Add">
        </p-button>

    </div>
</form>


@if(mainList().length > 0) {   

<div class="card">
    <p-table
        #dt1
        [value]="mainList()"      
        [globalFilterFields]="['name']"
        dataKey="id"
        [tableStyle]="{ 'min-width': '50rem' }"
        [rows]="5"
        [paginator]="true"
    >

        <ng-template #caption>
            <p-iconfield iconPosition="left">
                <p-inputicon>
                    <i class="pi pi-search"></i>
                </p-inputicon>
                <input pInputText 
                       type="text"  
                       (input)="dt1.filterGlobal($any($event.target).value, 'contains')" 
                       placeholder="Global Search" />
            </p-iconfield>
        </ng-template>

        <ng-template #header>
            <tr>
                <th pSortableColumn="name" style="width:25%">
                    <div class="flex items-center gap-2">
                        Name
                        <p-sortIcon field="name" />
                    </div>
                </th>
                <th>Delete</th>
            </tr>
        </ng-template>

        <ng-template #body let-row>
            <tr>
                <td>{{ row.name }}</td>
                <td>
                    <button pButton 
                            type="button" 
                            icon="pi pi-trash" 
                            (click)="Delete(row.id)">
                    </button>
                </td>
            </tr>
        </ng-template>

        <ng-template #emptymessage>
            <tr>
                <td colspan="4">No data found.</td>
            </tr>
        </ng-template>

    </p-table>
</div>

}
