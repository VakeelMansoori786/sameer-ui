
<div class="card">
    <p-table
        #dt1
        [value]="mainList()"      
        [globalFilterFields]="['name','category_name','unit_name','purchase_price','sale_price','stock']"
        dataKey="id"
        [tableStyle]="{ 'min-width': '50rem' }"
        [rows]="5"
        [paginator]="true"
        [rowsPerPageOptions]="[5,10,20]"
        [loading]="loading()"
    >
<ng-template #caption>
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-semibold">Product</h2>
                <p-iconfield iconPosition="left">
                    <p-inputicon>
                        <i class="pi pi-search"></i>
                    </p-inputicon>
                    <input pInputText 
                           type="text"  
                           (input)="dt1.filterGlobal($any($event.target).value, 'contains')" 
                           placeholder="Search supplier..." />
                </p-iconfield>
            </div>
        </ng-template>
        <ng-template #caption>
            <p-iconfield iconPosition="left">
                <p-inputicon>
                    <i class="pi pi-search"></i>
                </p-inputicon>
                <input pInputText 
                       type="text"  
                       (input)="dt1.filterGlobal($any($event.target).value, 'contains')" 
                       placeholder="Global Search" />
            </p-iconfield>
        </ng-template>

        <ng-template #header>
            <tr>
                <th pSortableColumn="name">
                    <div class="flex items-center gap-2">
                        Name
                        <p-sortIcon field="name" />
                    </div>
                    
                
                </th>
                  <th pSortableColumn="category_name">
<div class="flex items-center gap-2">
                        Category
                        <p-sortIcon field="category_name" />
                    </div>
                  </th>
                  
                  <th pSortableColumn="unit_name">
 <div class="flex items-center gap-2">
                        Unit
                        <p-sortIcon field="unit_name" />
                    </div>
                  </th>
                  <th pSortableColumn="purchase_price">
 <div class="flex items-center gap-2">
                        Purchase
                        <p-sortIcon field="purchase_price" />
                    </div>
                  </th>
                  <th pSortableColumn="sale_price">
                    <div class="flex items-center gap-2">
                        Sale
                        <p-sortIcon field="sale_price" />
                    </div>
                  </th>
                  <th pSortableColumn="stock">
                    <div class="flex items-center gap-2">
                        Stock
                        <p-sortIcon field="stock" />
                    </div>
                  </th>
                <th>Action</th>
            </tr>
        </ng-template>

        <ng-template #body let-row>
            <tr>
                <td>{{ row.name }}</td>
                <td>{{ row.category_name }}</td>
                <td>{{ row.unit_name }}</td>
                <td>{{ row.purchase_price }}</td>
                <td>{{ row.sale_price }}</td>
                <td>{{ row.stock }}</td>
                 <td class="flex gap-2">
                    <button pButton 
                            type="button" 
                            icon="pi pi-pencil"
                            class="p-button-warning"
                            (click)="edit(row.id)">
                    </button>

                    <button pButton 
                            type="button" 
                            icon="pi pi-trash" 
                            class="p-button-danger"
                            (click)="delete(row.id)">
                    </button>
                </td>
                    
            </tr>
        </ng-template>

        <ng-template #emptymessage>
            <tr>
                <td colspan="4">No data found.</td>
            </tr>
        </ng-template>

    </p-table>
</div>
