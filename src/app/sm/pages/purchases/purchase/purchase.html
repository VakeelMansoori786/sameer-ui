<p-toast></p-toast>

<form [formGroup]="purchaseForm" (ngSubmit)="onSubmit()" class="card p-5 flex flex-col gap-6">

  <div class="flex flex-col md:flex-row gap-6">

<div class="w-full">
<label>Supplier</label>

<p-select
formControlName="supplier_id"
[options]="suppliersList()"
optionLabel="name"
optionValue="id"
      [filter]="true"
placeholder="Select Supplier"
class="w-full">
</p-select>

</div>

<div class="w-full">
<label>Purchase Date</label>

<input pInputText type="date"
formControlName="purchase_date"
class="w-full"/>
</div>

<div class="w-full">
      <label>Status</label>
      <p-select
        formControlName="status"
        [options]="statusList()"
        optionLabel="name"
        optionValue="value"
        placeholder="Select status"
      [filter]="true"
      [invalid]="purchaseForm.get('status')?.invalid && purchaseForm.get('status')?.touched"
        class="w-full">
      </p-select>
    </div>
</div>

<p-table [value]="items.controls">

<ng-template #header>
<tr>
<th style="width:60%">Product</th>
<th style="width:10%">Qty</th>
<th style="width:10%">Price</th>
<th style="width:10%">Total</th>
<th>Action</th>
</tr>
</ng-template>

<ng-template #body let-row let-i="rowIndex">

<tr [formGroup]="row">

<td>

<p-autoComplete
formControlName="product"
[suggestions]="filteredProducts"
(completeMethod)="searchProduct($event)"
optionLabel="name"
(onSelect)="onProductSelect($event,i)"
placeholder="Search Product"
 appendTo="body"
  [invalid]="row.get('product')?.invalid && row.get('product')?.touched"
  styleClass="w-full"
  inputStyleClass="w-full"
appendTo="body">
</p-autoComplete>

</td>

<td>
<input pInputText type="number"
formControlName="qty" [invalid]="row.get('qty')?.invalid && row.get('qty')?.touched"
(input)="calculateRow(i)"/>
</td>

<td>
<input pInputText type="number"
formControlName="price" [invalid]="row.get('price')?.invalid && row.get('price')?.touched"
(input)="calculateRow(i)"/>
</td>

<td>
{{row.value.total | number:'1.2-2'}}
</td>

  <td class="flex gap-2">

<button pButton icon="pi pi-trash"
type="button"
(click)="removeItem(i)">
</button>

@if(i === items.length - 1){
<button pButton icon="pi pi-plus"
type="button"
(click)="addItem()">
</button>
}

</td>

</tr>

</ng-template>

</p-table>

<div class="flex gap-4 justify-end">

<div>
<label>Total</label>
<input pInputText readonly formControlName="total"/>
</div>

<div>
<label>Discount</label>
<input pInputText type="number"
formControlName="discount"
(input)="calculateGrandTotal()"/>
</div>

<div>
<label>VAT</label>
<input pInputText readonly formControlName="vat_amount"/>
</div>

<div>
<label>Grand Total</label>
<input pInputText readonly formControlName="grand_total"/>
</div>

</div>

<div class="flex flex-wrap gap-2 w-full">
  <button pButton type="submit" label="Save"
    class="p-3 text-xl">
  </button>
</div>

</form>
